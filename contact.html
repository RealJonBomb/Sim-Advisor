<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Sim Advisor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="images/logo-removebg-preview.png" alt="Sim Advisor logo" class="logo-img">
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="pricing.html">Pricing</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a class="active" href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Page Header -->
    <header class="hero small-hero">
        <h1>Contact Us</h1>
        <p>Have questions? Ready to start your build? We’re here to help.</p>
    </header>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="contact-info">
            <h2>Get in Touch</h2>
            <p><strong>Email:</strong> simadvisor.co@gmail.com</p>
            <p><strong>Phone:</strong> (610) 427‑1687</p>
            <p><strong>Location:</strong> Philadelphia PA</p>
        </div>

        <form class="contact-form" action="https://formspree.io/f/yourFormID" method="POST">
            <h2>Send a Message</h2>

            <label>Name</label>
            <input type="text" name="name" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Message</label>
            <textarea name="message" rows="5" required></textarea>

            <button type="submit" class="cta-button">Send Message</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Sim Advisor — All Rights Reserved</p>
    </footer>

</body>
</html>
