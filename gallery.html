<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Sim Advisor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="images/logo-removebg-preview.png" alt="Sim Advisor logo" class="logo-img">
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="pricing.html">Pricing</a></li>
            <li><a class="active" href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Page Header -->
    <header class="hero small-hero">
        <h1>Gallery</h1>
        <p>A look at the racing simulator setups we help customers build.</p>
    </header>

    <!-- Gallery Section -->
    <section class="gallery-section">

        <!-- Replace these with your real filenames -->
        <div class="gallery-item">
            <img src="images/20241217_215340.jpg" alt="Sim rig photo 1" onclick="openLightbox(this.src)">
        </div>

        <div class="gallery-item">
            <img src="images/20250408_214654.jpg" alt="Sim rig photo 2" onclick="openLightbox(this.src)">
        </div>

        <div class="gallery-item">
            <img src="images/20250414_003719.jpg" alt="Sim rig photo 3" onclick="openLightbox(this.src)">
        </div>

        <div class="gallery-item">
            <img src="images/20250227_035449.jpg" alt="Sim rig photo 4" onclick="openLightbox(this.src)">
        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Sim Advisor — All Rights Reserved</p>
    </footer>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="">
    </div>
    <script>
        function openLightbox(src) {
            document.getElementById("lightbox-img").src = src;
            document.getElementById("lightbox").style.display = "flex";
        }
        
        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
        }
    </script>

</body>
</html>
